refresh:
  name: Refresh HACS data
  description: Force refresh of HACS repository data.

install_repository:
  name: Install repository
  description: Install a repository from HACS.
  fields:
    repository:
      name: Repository
      description: Full name of the repository (author/repo).
      required: true
      example: "custom-components/sensor"
      selector:
        text:
    category:
      name: Category
      description: Repository category.
      required: false
      default: "integration"
      selector:
        select:
          options:
            - "integration"
            - "plugin"
            - "theme"
            - "appdaemon"
            - "python_script"
            - "netdaemon"

find_entity_refs:
  name: 查找实体引用
  description: 查找 HA 中所有引用指定 entity_id 的位置（自动化、脚本、场景、仪表盘、蓝图）。
  fields:
    entity_id:
      name: 实体 ID
      description: 要查找的实体标识符（如 sensor.temperature）。
      required: true
      example: "sensor.temperature"
      selector:
        text:

replace_entity_refs:
  name: 替换实体引用
  description: 替换 HA 中所有对旧 entity_id 的引用为新 entity_id。
  fields:
    old_id:
      name: 旧实体 ID
      description: 要被替换的旧实体标识符。
      required: true
      example: "sensor.old_temperature"
      selector:
        text:
    new_id:
      name: 新实体 ID
      description: 替换后的新实体标识符。
      required: true
      example: "sensor.new_temperature"
      selector:
        text:
    preview:
      name: 预览模式
      description: 为 true 时只预览不执行，为 false 时执行替换。
      required: false
      default: true
      selector:
        boolean: