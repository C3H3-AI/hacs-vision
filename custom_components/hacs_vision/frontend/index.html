<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HACS Vision</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow-x: hidden;
      background: transparent;
    }
  </style>
</head>
<body>
  <hacs-vision-panel></hacs-vision-panel>
  <script src="./panel.js"></script>
  <script>
    // Bridge: get hass from parent HA frame and pass it to the panel
    // This makes the iframe work as if it were a native HA panel
    (function() {
      var panel = document.querySelector('hacs-vision-panel');
      if (!panel) return;

      function bridgeHass() {
        try {
          var haEl = window.parent.document.querySelector('home-assistant');
          if (haEl && haEl.hass && !panel.hass) {
            panel.hass = haEl.hass;
            return true;
          }
        } catch(e) {}
        return false;
      }

      // Try immediately, then poll up to 10s
      if (!bridgeHass()) {
        var count = 0;
        var iv = setInterval(function() {
          count++;
          if (bridgeHass() || count >= 20) clearInterval(iv);
        }, 500);
      }
    })();
  </script>
</body>
</html>
